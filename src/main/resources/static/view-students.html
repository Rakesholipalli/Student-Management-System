<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Student Management System</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-student.html">Add Student</a></li>
                <li><a href="view-students.html" class="active">View Students</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="table-container">
            <h2>All Students</h2>
            
            <div id="message" class="message"></div>
            
            <div class="table-wrapper">
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <tr>
                            <td colspan="5" class="loading">Loading students...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Student</h2>
            
            <form id="editStudentForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label for="editName">Student Name:</label>
                    <input type="text" id="editName" required>
                </div>
                
                <div class="form-group">
                    <label for="editEmail">Email:</label>
                    <input type="email" id="editEmail" required>
                </div>
                
                <div class="form-group">
                    <label for="editCourse">Course:</label>
                    <input type="text" id="editCourse" required>
                </div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Update Student</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Student Management System. Simple CRUD Application.</p>
    </footer>

    <script src="js/view-students.js"></script>
</body>
</html>
