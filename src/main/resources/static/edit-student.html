<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Student Management System</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-student.html">Add Student</a></li>
                <li><a href="view-students.html" class="active">View Students</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2>Edit Student</h2>
            
            <div id="message" class="message"></div>
            
            <form id="editStudentForm">
                <input type="hidden" id="studentId">
                
                <div class="form-group">
                    <label for="name">Student Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="course">Course:</label>
                    <input type="text" id="course" name="course" required>
                </div>
                
                <div class="form-buttons">
                    <button type="submit" class="btn btn-primary">Update Student</button>
                    <a href="view-students.html" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Student Management System. Simple CRUD Application.</p>
    </footer>

    <script src="js/edit-student.js"></script>
</body>
</html>
